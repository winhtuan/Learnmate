services:

  # ── Blazor App ───────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Database
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=learnmate;Username=postgres;
        Password=${DB_PASSWORD};Pooling=true;Ssl Mode=Disable;
      # JWT — override the dev key in appsettings.json
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__Issuer: learnmate
      Jwt__Audience: learnmate
      Jwt__ExpiryMinutes: 60
      # Email
      EmailSettings__SenderEmail: ${EMAIL_SENDER}
      EmailSettings__Password: ${EMAIL_PASSWORD}
      # MinIO
      MinIO__Endpoint: minio:9000
      MinIO__AccessKey: ${MINIO_ACCESS_KEY}
      MinIO__SecretKey: ${MINIO_SECRET_KEY}
      MinIO__BucketName: learnmate
      MinIO__UseSSL: "false"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: learnmate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d learnmate"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── MinIO ─────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console: http://localhost:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pg_data:
  minio_data:
